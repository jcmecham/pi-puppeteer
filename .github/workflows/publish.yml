name: Publish

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify trusted publishing toolchain
        shell: bash
        run: |
          node --version
          npm_version=$(npm --version)
          echo "npm ${npm_version}"
          node -e "const v = process.argv[1].split('.').map(Number); if (v[0] < 11 || (v[0] === 11 && v[1] < 5) || (v[0] === 11 && v[1] === 5 && v[2] < 1)) throw new Error('npm ' + process.argv[1] + ' is too old for trusted publishing; npm >= 11.5.1 is required.');" "${npm_version}"

      - name: Install dependencies
        run: npm ci

      - name: Validate release bundle
        run: npm run publish:check

      - name: Check whether this version is already on npm
        id: npm_check
        shell: bash
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published; skipping npm publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is not published yet; proceeding."
          fi

      - name: Publish to npm
        if: steps.npm_check.outputs.exists != 'true'
        run: npm publish --access public --provenance

      - name: Skip publish because version already exists
        if: steps.npm_check.outputs.exists == 'true'
        run: echo "Skipping npm publish because this exact version is already on npm."
